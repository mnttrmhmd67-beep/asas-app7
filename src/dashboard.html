<h2 class="title">الأسعار المقدمة</h2>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []
let container = document.getElementById("orders")

orders.forEach((order)=>{

if(order.prices.length > 0){

let div = document.createElement("div")

let pricesHTML = ""

order.prices.forEach(price=>{
pricesHTML += `<p>السعر: ${price} دينار / طن</p>`
})

div.innerHTML = `
<p>قطر الحديد: ${order.diameter}</p>
<p>الكمية: ${order.qty}</p>

${pricesHTML}

<hr>
`

container.appendChild(div)

}

})

</script>
