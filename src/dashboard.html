<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - منصة أساس</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">منصة أساس</a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="customers.html">العملاء</a></li>
        <li><a href="suppliers.html">الموردين</a></li>
        <li><a href="dashboard.html" class="active">لوحة التحكم</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="dashboard-section">
      <h1>لوحة التحكم الرئيسية</h1>
      <div class="cards-container">
        <div class="card">
          <h2>عدد العملاء</h2>
          <p id="customers-count">0</p>
        </div>
        <div class="card">
          <h2>عدد الموردين</h2>
          <p id="suppliers-count">0</p>
        </div>
        <div class="card">
          <h2>إجمالي الطلبات</h2>
          <p id="orders-count">0</p>
        </div>
      </div>
      <button id="refresh-dashboard-btn">تحديث البيانات</button>
    </section>
  </main>

  <footer>
    <p>© 2026 منصة أساس</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    // بيانات تجريبية (يمكن استبدالها بالاستدعاء من قاعدة البيانات لاحقًا)
    const customersCount = 12;
    const suppliersCount = 5;
    const ordersCount = 23;

    // تحديث العدادات
    const updateDashboard = () => {
      document.getElementById("customers-count").textContent = customersCount;
      document.getElementById("suppliers-count").textContent = suppliersCount;
      document.getElementById("orders-count").textContent = ordersCount;
    };

    updateDashboard();

    // زر تحديث البيانات (يمكن ربطه لاحقًا بالAPI)
    document.getElementById("refresh-dashboard-btn").addEventListener("click", () => {
      alert("سيتم تحديث البيانات تلقائيًا من قاعدة البيانات لاحقًا.");
      updateDashboard();
    });
  </script>
</body>
</html>
