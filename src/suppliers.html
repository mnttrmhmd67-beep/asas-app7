<h1>طلبات التوريد</h1>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let container = document.getElementById("orders");

orders.forEach(o=>{

if(o.status=="approved"){

container.innerHTML += `
<div>

قطر: ${o.size}  
كمية: ${o.qty} طن

<button>قبول التوريد</button>

</div>
`;

}

});

</script>
