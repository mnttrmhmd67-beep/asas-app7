<h2 class="title">طلبات العملاء</h2>

<div id="supplierOrders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []

let container = document.getElementById("supplierOrders")

orders.forEach((order)=>{

if(order.status === "approved"){

let div = document.createElement("div")

div.innerHTML = `
<p>قطر الحديد: ${order.diameter}</p>
<p>الكمية: ${order.qty} طن</p>
<p>الموقع: ${order.location}</p>
<hr>
`

container.appendChild(div)

}

})

</script>
