<h2 class="title">طلبات العملاء</h2>

<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []
let container = document.getElementById("orders")

orders.forEach((order,index)=>{

if(order.status === "approved"){

let div = document.createElement("div")

div.innerHTML = `
<p>قطر الحديد: ${order.diameter}</p>
<p>الكمية: ${order.qty} طن</p>
<p>الموقع: ${order.location}</p>

<input type="number" placeholder="السعر للطن" id="price${index}">

<button onclick="sendPrice(${index})">
إرسال السعر
</button>

<hr>
`

container.appendChild(div)

}

})

function sendPrice(index){

let orders = JSON.parse(localStorage.getItem("orders"))

let price = document.getElementById("price"+index).value

orders[index].prices.push(price)

localStorage.setItem("orders", JSON.stringify(orders))

alert("تم إرسال السعر")

}

</script>
