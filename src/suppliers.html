<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الموردين - منصة أساس</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">منصة أساس</a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="customers.html">العملاء</a></li>
        <li><a href="suppliers.html" class="active">الموردين</a></li>
        <li><a href="dashboard.html">لوحة التحكم</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="suppliers-section">
      <h1>قائمة الموردين</h1>
      <table class="suppliers-table">
        <thead>
          <tr>
            <th>الرقم</th>
            <th>اسم المورد</th>
            <th>البريد الإلكتروني</th>
            <th>الهاتف</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="suppliers-table-body">
          <!-- سيتم ملء البيانات بواسطة JS -->
        </tbody>
      </table>
      <button id="add-supplier-btn">إضافة مورد جديد</button>
    </section>
  </main>

  <footer>
    <p>© 2026 منصة أساس</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    // مثال بيانات الموردين (يمكن استبدالها بالاستدعاء من قاعدة البيانات لاحقًا)
    const suppliers = [
      { id: 1, name: "مورد تجريبي", email: "supplier@example.com", phone: "07711111111" },
      { id: 2, name: "شركة الحديد العراقية", email: "iron@iraq.com", phone: "07722222222" }
    ];

    const tableBody = document.getElementById("suppliers-table-body");
    suppliers.forEach(supplier => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${supplier.id}</td>
        <td>${supplier.name}</td>
        <td>${supplier.email}</td>
        <td>${supplier.phone}</td>
        <td>
          <button class="edit-btn">تعديل</button>
          <button class="delete-btn">حذف</button>
        </td>
      `;
      tableBody.appendChild(row);
    });

    // زر إضافة مورد جديد (يمكن ربطه لاحقًا بنموذج أو نافذة منبثقة)
    document.getElementById("add-supplier-btn").addEventListener("click", () => {
      alert("سيتم إضافة مورد جديد هنا.");
    });
  </script>
</body>
</html>
