<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة أساس</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:#f5f7fb;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.logo{
font-size:40px;
font-weight:bold;
color:#1e4ed8;
margin-bottom:60px;
}

.container{
display:flex;
gap:80px;
}

.btn{
width:220px;
height:120px;
border-radius:12px;
border:none;
font-size:22px;
cursor:pointer;
color:white;
transition:0.3s;
}

.customer{
background:#2563eb;
}

.supplier{
background:#1e40af;
}

.btn:hover{
transform:scale(1.05);
}

.footer{
position:absolute;
bottom:20px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<div class="logo">منصة أساس</div>

<div class="container">

<a href="suppliers.html">
<button class="btn supplier">
الموردين
</button>
</a>

<a href="customers.html">
<button class="btn customer">
العملاء
</button>
</a>

</div>

<div class="footer">
منصة أساس لتوريد مواد البناء
</div>

</body>
</html>
