<script>

function order(diameter,price,inputId){

"القطر: "+diameter+" مم%0A"+
"الكمية: "+qty+" طن%0A"+
"السعر الكلي: "+total+" دينار";

window.open(
"https://wa.me/9647732670436?text="+message
);

}

</script>
